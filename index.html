<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Profile Transformer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Profile Forge</h1>
            <p>Unify messy recruiter CSVs and GitHub profiles into clean JSON data.</p>
        </header>

        <main>
            <form id="transformForm" class="glass-panel">
                <div class="form-group">
                    <label for="csvFile">Upload Recruiter CSV</label>
                    <div class="file-upload-wrapper" id="dropZone">
                        <input type="file" id="csvFile" name="csvFile" accept=".csv" />
                        <span id="fileName">Drag & drop or click to upload CSV</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="githubUrl">GitHub Profile URL (Optional)</label>
                    <input type="url" id="githubUrl" name="githubUrl" placeholder="e.g. https://github.com/torvalds" autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="toggle-label">
                        <span>Use Custom JSON Configuration</span>
                        <input type="checkbox" id="useConfigToggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="form-group" id="configGroup" style="display: none;">
                    <label for="configJson">Projection Config (JSON)</label>
                    <textarea id="configJson" name="configJson" rows="6" placeholder='{"fields": [{"path": "full_name", "type": "string", "required": true}]}'></textarea>
                </div>

                <button type="submit" id="submitBtn">
                    <span class="btn-text">Transform Data</span>
                    <div class="loader" id="loader" style="display: none;"></div>
                </button>
            </form>

            <div id="resultContainer" class="result-container glass-panel" style="display: none;">
                <div class="result-header">
                    <h2>Transformed Output</h2>
                    <button id="copyBtn" class="secondary-btn">Copy JSON</button>
                </div>
                <pre><code id="jsonOutput"></code></pre>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
